{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Depression Detection using EEG</title>
    <link rel="stylesheet" href="{% static 'depression_detection/css/style.css' %}">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h1>Depression Detection</h1>
            <h2>using EEG Signals</h2>
            <p>Please login to continue</p>
        </div>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-primary btn-full">Login</button>
        </form>
        <div class="login-hint">
            <p>New user? <a href="{% url 'register' %}">Register here</a></p>
        </div>
    </div>
</div>
</body>
</html>
