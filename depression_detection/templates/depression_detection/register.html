{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Depression Detection using EEG</title>

    <link rel="stylesheet" href="{% static 'depression_detection/css/style.css' %}">
</head>

<body class="login-body">

    <div class="login-container">

        <div class="login-box">

            <div class="login-header">
                <h1>Depression Detection</h1>
                <h2>using EEG Signals</h2>
                <p>Create a new account</p>
            </div>

            {% if error %}
            <div class="alert alert-error">
                {{ error }}
            </div>
            {% endif %}

            {% if success %}
            <div class="alert alert-success">
                {{ success }}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'register' %}">

                {% csrf_token %}

                <!-- USERNAME -->
                <div class="form-group">
                    <label for="username">Username</label>

                    <input type="text"
                           id="username"
                           name="username"
                           class="form-input"
                           placeholder="Enter username"
                           required>
                </div>

                <!-- EMAIL -->
                <div class="form-group email-group">
                    <label for="email" style="display: block; margin-bottom: 6px; font-weight: bold; color: #444; font-size: 13px;">Email</label>

                    <input type="email"
                           id="email"
                           name="email"
                           class="form-input"
                           style="width: 100%; padding: 12px 14px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; background: #fafafa; box-sizing: border-box; display: block;"
                           placeholder="Enter email"
                           required>
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <label for="password">Password</label>

                    <input type="password"
                           id="password"
                           name="password"
                           class="form-input"
                           placeholder="Enter password"
                           required>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>

                    <input type="password"
                           id="confirm_password"
                           name="confirm_password"
                           class="form-input"
                           placeholder="Confirm password"
                           required>
                </div>

                <button type="submit" class="btn-primary btn-full">
                    Register
                </button>

            </form>

            <div class="login-hint">
                <p>
                    Already have an account?
                    <a href="{% url 'login' %}">Login here</a>
                </p>
            </div>

        </div>

    </div>

</body>
</html>
